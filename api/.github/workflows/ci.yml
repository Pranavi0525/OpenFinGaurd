name: OpenFinGuard CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Format ──────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install black isort
      - run: black --check src/ api/ frontend/
      - run: isort --check-only src/ api/ frontend/

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --cov=src --cov=api --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t openfingraud:${{ github.sha }} .
      - name: Test container health
        run: |
          docker run -d --name test-api -p 8000:8000 openfingraud:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

  # ── Deploy (main branch only) ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: echo "✅ All checks passed. Ready to deploy OpenFinGuard v${{ github.sha }}"
      # Add your deployment step here (Railway, Fly.io, AWS ECS, etc.)